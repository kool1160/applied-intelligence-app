<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Applied Intelligence icon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#10265c"/>
      <stop offset="52%" stop-color="#061638"/>
      <stop offset="100%" stop-color="#020711"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7ed0ff"/>
      <stop offset="48%" stop-color="#005dff"/>
      <stop offset="100%" stop-color="#9ee7ff"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#dce9ff"/>
      <stop offset="100%" stop-color="#8fb5ff"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.45 0 0 0 0 1 0 0 0 .95 0" result="blueGlow"/>
      <feMerge><feMergeNode in="blueGlow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000814" flood-opacity=".55"/>
    </filter>
  </defs>
  <rect x="30" y="30" width="452" height="452" rx="104" fill="url(#bg)" stroke="url(#edge)" stroke-width="9" filter="url(#glow)"/>
  <path d="M92 302 C132 230 184 126 233 82 C266 88 291 119 312 155" fill="none" stroke="url(#metal)" stroke-width="34" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M100 330 C180 290 287 290 416 346" fill="none" stroke="url(#metal)" stroke-width="34" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M342 178 L428 342" fill="none" stroke="url(#metal)" stroke-width="34" stroke-linecap="round" filter="url(#shadow)"/>
  <text x="201" y="304" font-family="Arial Black, Inter, system-ui, sans-serif" font-size="154" font-weight="900" fill="url(#metal)" letter-spacing="-13" filter="url(#shadow)">AI</text>
  <circle cx="132" cy="278" r="27" fill="url(#metal)" stroke="#eef6ff" stroke-width="4" filter="url(#shadow)"/>
  <circle cx="352" cy="178" r="29" fill="url(#metal)" stroke="#eef6ff" stroke-width="4" filter="url(#shadow)"/>
  <circle cx="332" cy="326" r="27" fill="url(#metal)" stroke="#eef6ff" stroke-width="4" filter="url(#shadow)"/>
