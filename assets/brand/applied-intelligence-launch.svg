<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1170 2532" role="img" aria-label="Applied Intelligence launch screen">
  <defs>
    <radialGradient id="halo" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0d66ff" stop-opacity=".42"/>
      <stop offset="45%" stop-color="#071a45" stop-opacity=".36"/>
      <stop offset="100%" stop-color="#020711" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#071120"/>
      <stop offset="46%" stop-color="#030a16"/>
      <stop offset="100%" stop-color="#020711"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#7ed0ff"/><stop offset="48%" stop-color="#005dff"/><stop offset="100%" stop-color="#9ee7ff"/></linearGradient>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="55%" stop-color="#dce9ff"/><stop offset="100%" stop-color="#8fb5ff"/></linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%"><feGaussianBlur stdDeviation="14" result="blur"/><feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.45 0 0 0 0 1 0 0 0 .95 0" result="blueGlow"/><feMerge><feMergeNode in="blueGlow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000814" flood-opacity=".6"/></filter>
  </defs>
  <rect width="1170" height="2532" fill="url(#bg)"/>
  <circle cx="585" cy="1040" r="640" fill="url(#halo)"/>
  <text x="585" y="580" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif" font-size="28" letter-spacing="16" fill="#b8c8e8">APPLIED INTELLIGENCE ECOSYSTEM</text>
  <g transform="translate(329 740) scale(1)">
    <rect x="0" y="0" width="512" height="512" rx="104" fill="#030b22" stroke="url(#edge)" stroke-width="9" filter="url(#glow)"/>
    <path d="M62 272 C102 200 154 96 203 52 C236 58 261 89 282 125" fill="none" stroke="url(#metal)" stroke-width="34" stroke-linecap="round" filter="url(#shadow)"/>
    <path d="M70 300 C150 260 257 260 386 316" fill="none" stroke="url(#metal)" stroke-width="34" stroke-linecap="round" filter="url(#shadow)"/>
    <path d="M312 148 L398 312" fill="none" stroke="url(#metal)" stroke-width="34" stroke-linecap="round" filter="url(#shadow)"/>
    <text x="171" y="274" font-family="Arial Black, Inter, system-ui, sans-serif" font-size="154" font-weight="900" fill="url(#metal)" letter-spacing="-13" filter="url(#shadow)">AI</text>
    <circle cx="102" cy="248" r="27" fill="url(#metal)" stroke="#eef6ff" stroke-width="4" filter="url(#shadow)"/>
    <circle cx="322" cy="148" r="29" fill="url(#metal)" stroke="#eef6ff" stroke-width="4" filter="url(#shadow)"/>
    <circle cx="302" cy="296" r="27" fill="url(#metal)" stroke="#eef6ff" stroke-width="4" filter="url(#shadow)"/>
  </g>
  <text x="585" y="1420" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif" font-size="82" font-weight="800" fill="#eef4ff">Applied Intelligence</text>
  <text x="585" y="1505" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif" font-size="42" fill="#b8c8e8">Standardize to Optimize</text>
</svg>
